name: Daily AI News

on:
  schedule:
    - cron: "5 1 * * *" # 09:05 Asia/Shanghai (UTC+8)
    - cron: "20 1 * * *" # 09:20 Asia/Shanghai (UTC+8)
  repository_dispatch:
    types: [daily-ai-news]
  workflow_dispatch:

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && format('daily-ai-news-manual-{0}', github.run_id) || 'daily-ai-news-automatic' }}
  cancel-in-progress: false

permissions:
  contents: write
  models: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Restore sent-news history
        uses: actions/cache/restore@v5
        with:
          path: .state/history.json
          key: ai-news-history-${{ github.run_id }}
          restore-keys: |
            ai-news-history-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Check daily send guard
        id: daily_guard
        run: >-
          python -m ai_news_bot.daily_guard
          --event "${{ github.event_name }}"
          --digest web/public/data/latest.json
          --history .state/history.json
          --timezone Asia/Shanghai
          >> "$GITHUB_OUTPUT"

      - name: Skip duplicate scheduled retry
        if: steps.daily_guard.outputs.should_run == 'false'
        run: echo "A digest was already generated today; skipping this scheduled retry."

      - name: Generate daily result
        if: steps.daily_guard.outputs.should_run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.6-luna' }}
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-4o-mini' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ai-news-bot --dry-run

      - name: Persist latest web digest
        if: steps.daily_guard.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/latest.json
          if ! git diff --cached --quiet; then
            git commit -m "Update daily AI news"
            git push
          fi

      - name: Send persisted daily result
        if: steps.daily_guard.outputs.should_run == 'true'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SIGNING_SECRET: ${{ secrets.FEISHU_SIGNING_SECRET }}
        run: ai-news-bot --send-existing

      - name: Publish latest digest to private dashboard
        if: steps.daily_guard.outputs.should_run == 'true'
        env:
          SITE_DIGEST_ENDPOINT: ${{ secrets.SITE_DIGEST_ENDPOINT }}
          SITE_BYPASS_TOKEN: ${{ secrets.SITE_BYPASS_TOKEN }}
          SITE_DIGEST_UPDATE_SECRET: ${{ secrets.SITE_DIGEST_UPDATE_SECRET }}
        run: |
          curl --fail-with-body --retry 3 \
            -H "OAI-Sites-Authorization: Bearer $SITE_BYPASS_TOKEN" \
            -H "Authorization: Bearer $SITE_DIGEST_UPDATE_SECRET" \
            -H "Content-Type: application/json" \
            --data-binary @web/public/data/latest.json \
            "$SITE_DIGEST_ENDPOINT"

      - name: Save sent-news history
        if: steps.daily_guard.outputs.should_run == 'true' && hashFiles('.state/history.json') != ''
        uses: actions/cache/save@v5
        with:
          path: .state/history.json
          key: ai-news-history-${{ github.run_id }}
