name: Daily AI News

on:
  schedule:
    - cron: "0 9 * * *"
      timezone: "Asia/Shanghai"
  workflow_dispatch:

concurrency:
  group: daily-ai-news
  cancel-in-progress: false

permissions:
  contents: write
  models: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore sent-news history
        uses: actions/cache/restore@v4
        with:
          path: .state/history.json
          key: ai-news-history-${{ github.run_id }}
          restore-keys: |
            ai-news-history-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Collect, curate, and send
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.6-luna' }}
          GITHUB_MODELS_MODEL: ${{ vars.GITHUB_MODELS_MODEL || 'openai/gpt-4o-mini' }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SIGNING_SECRET: ${{ secrets.FEISHU_SIGNING_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ai-news-bot

      - name: Persist latest web digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/latest.json
          if ! git diff --cached --quiet; then
            git commit -m "Update daily AI news"
            git push
          fi

      - name: Save sent-news history
        if: success() && hashFiles('.state/history.json') != ''
        uses: actions/cache/save@v4
        with:
          path: .state/history.json
          key: ai-news-history-${{ github.run_id }}
